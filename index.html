<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebP Converter Pro - Zip Support</title>
    <!-- JSZip Library Loading -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --error: #f43f5e;
            --accent: #f59e0b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        .card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 2.2rem;
            background: linear-gradient(to right, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 20px;
            padding: 3rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(30, 41, 59, 0.5);
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--accent);
            background: rgba(245, 158, 11, 0.05);
        }

        #fileInput { display: none; }

        .controls {
            margin-top: 1.5rem;
            padding: 1.5rem;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .control-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .presets {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .preset-btn {
            flex: 1;
            padding: 6px;
            font-size: 0.75rem;
            background: var(--border);
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .preset-btn:hover { background: #475569; }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent);
        }

        .preview-list {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .preview-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: rgba(51, 65, 85, 0.3);
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .preview-item img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 10px;
        }

        .file-info { flex-grow: 1; min-width: 0; }
        .file-name { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-meta { font-size: 0.8rem; color: var(--text-muted); }

        .btn {
            padding: 0.7rem 1.2rem;
            border-radius: 10px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { transform: scale(1.02); background: #fbbf24; }
        .btn-success { background: var(--success); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: white; }
        .btn-outline:hover { background: rgba(255,255,255,0.05); }

        .reduction-positive { color: var(--success); font-weight: bold; }
        .reduction-negative { color: var(--error); }

        .hidden { display: none !important; }

        #globalActions {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* ZIP loading animation */
        .loading-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <header>
                <h1>WebP Weight <span style="font-weight: 300;">Reducer</span></h1>
                <p>Convert and download everything in a single ZIP archive</p>
            </header>

            <div id="dropZone" class="upload-area">
                <p>Drag and drop heavy KB images here</p>
                <span style="color: var(--text-muted); font-size: 0.8rem;">Supports JPG and PNG</span>
                <input type="file" id="fileInput" accept="image/png, image/jpeg" multiple>
            </div>

            <div class="controls">
                <div class="control-grid">
                    <div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                            <label style="font-size: 0.9rem; font-weight: 600;">Desired Quality</label>
                            <span id="qualityDisplay" style="color: var(--accent); font-weight: 800;">75%</span>
                        </div>
                        <input type="range" id="qualityRange" min="0.1" max="0.95" step="0.05" value="0.75">
                        <div class="presets">
                            <button class="preset-btn" onclick="setQuality(0.3)">Min Size (30%)</button>
                            <button class="preset-btn" onclick="setQuality(0.6)">Balanced (60%)</button>
                            <button class="preset-btn" onclick="setQuality(0.85)">High (85%)</button>
                        </div>
                    </div>
                    <div>
                        <label style="font-size: 0.9rem; font-weight: 600; display: block; margin-bottom: 8px;">Extra Options</label>
                        <div style="font-size: 0.8rem; color: var(--text-muted);">
                            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-main);">
                                <input type="checkbox" id="resizeToggle" checked> Resize if > 1920px
                            </label>
                            <p style="margin-top: 5px;">* Resizing helps reduce weight drastically.</p>
                        </div>
                    </div>
                </div>
            </div>

            <div id="fileList" class="preview-list"></div>

            <div id="globalActions" class="hidden">
                <button id="clearAllBtn" class="btn btn-outline">Remove All</button>
                <button id="convertAllBtn" class="btn btn-primary">Optimize All</button>
                <button id="downloadZipBtn" class="btn btn-success hidden">
                    <span>Download ZIP Archive</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const fileList = document.getElementById('fileList');
        const qualityRange = document.getElementById('qualityRange');
        const qualityDisplay = document.getElementById('qualityDisplay');
        const resizeToggle = document.getElementById('resizeToggle');
        const convertAllBtn = document.getElementById('convertAllBtn');
        const downloadZipBtn = document.getElementById('downloadZipBtn');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const globalActions = document.getElementById('globalActions');

        let queue = [];

        function setQuality(val) {
            qualityRange.value = val;
            qualityDisplay.textContent = Math.round(val * 100) + '%';
        }

        qualityRange.addEventListener('input', (e) => {
            qualityDisplay.textContent = Math.round(e.target.value * 100) + '%';
        });

        dropZone.addEventListener('click', () => fileInput.click());
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => {
            dropZone.addEventListener(e, (ev) => { ev.preventDefault(); ev.stopPropagation(); });
        });
        dropZone.addEventListener('drop', (e) => handleFiles(e.dataTransfer.files));
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (!file.type.match('image.*')) return;
                const item = { 
                    id: crypto.randomUUID(), 
                    file, 
                    converted: false, 
                    url: URL.createObjectURL(file),
                    resultBlob: null,
                    resultName: null
                };
                queue.push(item);
                renderItem(item);
            });
            updateGlobalUI();
        }

        function renderItem(item) {
            const div = document.createElement('div');
            div.className = 'preview-item';
            div.id = `item-${item.id}`;
            div.innerHTML = `
                <img src="${item.url}">
                <div class="file-info">
                    <span class="file-name">${item.file.name}</span>
                    <div class="file-meta">Original: ${(item.file.size/1024).toFixed(1)} KB</div>
                </div>
                <div class="actions">
                    <button class="btn btn-primary" onclick="processFile('${item.id}')">Optimize</button>
                </div>
            `;
            fileList.appendChild(div);
        }

        async function processFile(id) {
            const item = queue.find(i => i.id === id);
            if (!item || item.converted) return;

            const div = document.getElementById(`item-${id}`);
            const meta = div.querySelector('.file-meta');
            const actions = div.querySelector('.actions');

            const img = new Image();
            img.src = item.url;
            
            try {
                await img.decode();
            } catch (e) {
                console.error("Image loading error", e);
                return;
            }

            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;

            if (resizeToggle.checked && (width > 1920 || height > 1920)) {
                const ratio = Math.min(1920 / width, 1920 / height);
                width *= ratio;
                height *= ratio;
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.drawImage(img, 0, 0, width, height);

            const quality = parseFloat(qualityRange.value);
            
            return new Promise((resolve) => {
                canvas.toBlob((blob) => {
                    const resultName = item.file.name.split('.')[0] + ".webp";
                    
                    item.converted = true;
                    item.resultBlob = blob;
                    item.resultName = resultName;

                    const reduction = (((item.file.size - blob.size) / item.file.size) * 100).toFixed(1);
                    const isLighter = blob.size < item.file.size;

                    meta.innerHTML = `
                        Orig: ${(item.file.size/1024).toFixed(1)} KB → 
                        <b>WebP: ${(blob.size/1024).toFixed(1)} KB</b><br>
                        <span class="${isLighter ? 'reduction-positive' : 'reduction-negative'}">
                            ${isLighter ? 'Savings: -' + reduction + '%' : 'Warning: file is heavier!'}
                        </span>
                    `;

                    // Create a temporary URL for single download if needed
                    const singleUrl = URL.createObjectURL(blob);
                    actions.innerHTML = `
                        <a href="${singleUrl}" download="${resultName}" class="btn btn-success">Download</a>
                    `;
                    
                    updateGlobalUI();
                    resolve();
                }, 'image/webp', quality);
            });
        }

        window.removeItem = (id) => {
            const item = queue.find(i => i.id === id);
            if (item) {
                URL.revokeObjectURL(item.url);
            }
            queue = queue.filter(i => i.id !== id);
            document.getElementById(`item-${id}`).remove();
            updateGlobalUI();
        };

        convertAllBtn.onclick = async () => {
            convertAllBtn.disabled = true;
            convertAllBtn.textContent = "Processing...";
            const toProcess = queue.filter(i => !i.converted);
            for (const item of toProcess) {
                await processFile(item.id);
            }
            convertAllBtn.disabled = false;
            convertAllBtn.textContent = "Optimize All";
        };

        // DOWNLOAD ZIP FUNCTION
        downloadZipBtn.onclick = async () => {
            const convertedItems = queue.filter(i => i.converted && i.resultBlob);
            if (convertedItems.length === 0) return;

            const originalContent = downloadZipBtn.innerHTML;
            downloadZipBtn.disabled = true;
            downloadZipBtn.innerHTML = '<div class="loading-spinner"></div><span>Creating ZIP...</span>';

            try {
                const zip = new JSZip();
                
                // Add each WebP file to the zip
                convertedItems.forEach(item => {
                    zip.file(item.resultName, item.resultBlob);
                });

                // Generate archive
                const content = await zip.generateAsync({ type: "blob" });
                
                // Download archive
                const zipName = "optimized_webp_images.zip";
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = zipName;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

            } catch (err) {
                console.error("ZIP creation error:", err);
            } finally {
                downloadZipBtn.disabled = false;
                downloadZipBtn.innerHTML = originalContent;
            }
        };

        clearAllBtn.onclick = () => {
            queue.forEach(item => URL.revokeObjectURL(item.url));
            queue = [];
            fileList.innerHTML = '';
            updateGlobalUI();
        };

        function updateGlobalUI() {
            globalActions.classList.toggle('hidden', queue.length === 0);
            const hasConverted = queue.some(i => i.converted);
            downloadZipBtn.classList.toggle('hidden', !hasConverted);
        }
    </script>
</body>
</html>
